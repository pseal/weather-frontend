<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(to bottom, #4facfe, #00f2fe);
        color: black;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 10px;
    }

    h1 {
        margin-top: 20px;
        font-size: 32px;
        font-weight: 700;
    }

    /* Search Bar */
    .search-container {
        margin: 20px 0;
        display: flex;
        gap: 10px;
        width: 100%;
        max-width: 500px;
    }

    .search-container input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    .search-container button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #003cff;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    /* HERO SECTION */
    .hero {
        width: 100%;
        max-width: 600px;
        background: rgba(255,255,255,0.15);
        padding: 20px;
        border-radius: 16px;
        text-align: center;
        backdrop-filter: blur(10px);
        margin-bottom: 20px;
    }

    .hero h2 {
        margin: 0;
        font-size: 28px;
    }

    .hero .temp {
        font-size: 60px;
        font-weight: bold;
        margin: 10px 0;
    }

    .hero .condition {
        font-size: 20px;
        opacity: 0.9;
    }

    /* HOURLY SCROLL */
    .hourly-container {
        width: 100%;
        max-width: 900px;
        overflow-x: auto;
        display: flex;
        gap: 12px;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .hour-card {
        min-width: 120px;
        background: rgba(255,255,255,0.2);
        padding: 12px;
        border-radius: 12px;
        text-align: center;
        backdrop-filter: blur(8px);
    }

    .hour-card img {
        width: 50px;
    }

    /* WEEKLY GRID */
    .weekly-grid {
        width: 100%;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 40px;
    }

    .day-card {
        background: rgba(255,255,255,0.2);
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        backdrop-filter: blur(8px);
    }

    .day-card img {
        width: 50px;
    }

    /* FOOTER */
    footer {
        margin: 20px 0;
        opacity: 0.8;
        font-size: 14px;
    }
</style>
</head>

<body>

<h1>Weather App</h1>

<!-- SEARCH -->
<div class="search-container">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="getWeather()">Search</button>
</div>

<!-- HERO SECTION -->
<div class="hero" id="heroSection">
    <h2 id="locationName">City</h2>
    <div class="temp" id="currentTemp">--°C</div>
    <div class="condition" id="currentCondition">Condition</div>
</div>

<!-- HOURLY FORECAST -->
<h2>Next 12 Hours</h2>
<div class="hourly-container" id="hourlyForecast"></div>

<!-- WEEKLY FORECAST -->
<h2>Next 7 Days</h2>
<div class="weekly-grid" id="weeklyForecast"></div>

<footer>Powered by WeatherAPI • Built by Prasenjit</footer>

<script src="app.js"></script>
</body>
</html>
